<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prontuário Eletrônico</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.hero {
  background-image: url('img/Veronica2.jpeg'); /* referência corrigida */
  background-size: cover;
  background-position: 50% 45%; /* ajuste vertical para rosto visível */
  background-repeat: no-repeat;
  width: 100%;
  height: 100vh;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.overlay {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.4);
  z-index:1;
}

.hero-content {
  position: relative;
  z-index:2;
  text-align: center;
  color: #fff;
  max-width: 700px;
}

.hero-content h1 {
  font-size: 3rem;
  margin-bottom: 20px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

.hero-content .welcome {
  font-size: 2rem;
  margin-bottom: 40px;
  background: rgba(0,0,0,0.5);
  padding: 15px 30px;
  border-radius: 10px;
}

.hero-content .btn-login {
  padding: 15px 40px;
  font-size: 1.2rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background-color: #0066cc;
  color: white;
  transition: background 0.3s;
}

.hero-content .btn-login:hover {
  background-color: #004a99;
}

@media (max-width:768px) {
  .hero-content h1 { font-size: 2rem; }
  .hero-content .welcome { font-size: 1.5rem; padding: 10px 20px; }
  .hero-content .btn-login { width: 80%; font-size: 1rem; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <h1>Prontuário Eletrônico</h1>
    <div class="welcome">Seja bem-vinda, Dra. Veronica!</div>
    <button class="btn-login" onclick="window.location.href='login.html'">Login Profissional</button>
  </div>
</div>

</body>
</html>
